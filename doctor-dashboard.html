<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doctor Dashboard – HealthVault</title>
<link rel="stylesheet" href="style.css">
<style>
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;}
.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:20px;}
.tab{padding:10px 18px;font-size:14px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--gray-500);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.feedback-item{padding:14px;border:1px solid var(--gray-200);border-radius:var(--radius-sm);margin-bottom:10px;}
.fb-stars{color:#f59e0b;letter-spacing:2px;font-size:16px;}
.chart-wrap{position:relative;height:260px;}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">HealthVault</span>
  <div class="topbar-actions">
    <span style="font-size:13px;color:var(--gray-500);">Doctor Panel</span>
    <button class="btn btn-sm btn-outline" onclick="window.location.href='dashboard.html'">← Patient View</button>
    <button class="btn btn-sm btn-outline" onclick="window.location.href='index.html'">Logout</button>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <h2>Doctor Dashboard</h2>
    <p>Manage patient records and view health analytics</p>
  </div>

  <div class="grid-3">
    <div class="stat-card blue">
      <div class="stat-label">Total Records</div>
      <div class="stat-value" id="totalRec">—</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Total Patients</div>
      <div class="stat-value" id="totalPat">—</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Avg Feedback</div>
      <div class="stat-value" id="avgFb">—</div>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('patients')">Patients</button>
    <button class="tab" onclick="showTab('analytics')">Analytics</button>
    <button class="tab" onclick="showTab('feedback')">Feedback</button>
  </div>

  <!-- PATIENTS TAB -->
  <div class="tab-panel active" id="tab-patients">
    <div class="card">
      <h3 style="font-size:16px;font-weight:500;margin-bottom:14px;">Select Patient</h3>
      <div class="input-row">
        <select class="input" id="patientName" style="flex:2;"></select>
        <button class="btn" onclick="goAdd()" style="flex:1;width:auto;">Add Record</button>
        <button class="btn btn-outline" onclick="goView()" style="flex:1;width:auto;">View Records</button>
      </div>
    </div>
    <div style="margin-top:20px;">
      <h3 style="font-size:15px;font-weight:500;margin-bottom:14px;">All Records</h3>
      <div id="allRecordsTable"></div>
    </div>
  </div>

  <!-- ANALYTICS TAB -->
  <div class="tab-panel" id="tab-analytics">
    <div class="grid-2">
      <div class="card">
        <div style="font-weight:500;margin-bottom:14px;">Diagnoses Breakdown</div>
        <div class="chart-wrap"><canvas id="diagChart"></canvas></div>
      </div>
      <div class="card">
        <div style="font-weight:500;margin-bottom:14px;">Records by Gender</div>
        <div class="chart-wrap"><canvas id="genderChart"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-top:16px;">
      <div style="font-weight:500;margin-bottom:14px;">Records Added Over Time</div>
      <div style="position:relative;height:220px;"><canvas id="timeChart"></canvas></div>
    </div>
  </div>

  <!-- FEEDBACK TAB -->
  <div class="tab-panel" id="tab-feedback">
    <div id="feedbackList"><p style="color:var(--gray-400);font-size:14px;">Loading feedback...</p></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API = 'http://localhost:3000';
let records = [];
let chartsDrawn = false;

fetch(API+'/records')
  .then(r=>r.json())
  .then(data=>{
    records = data;
    document.getElementById('totalRec').textContent = data.length;
    let patients = [...new Set(data.map(r=>r.name).filter(Boolean))];
    document.getElementById('totalPat').textContent = patients.length;
    let sel = document.getElementById('patientName');
    sel.innerHTML = patients.length===0
      ? '<option value="">No patients yet</option>'
      : patients.map(p=>`<option>${p}</option>`).join('');
    renderTable(data);
  })
  .catch(()=>{
    document.getElementById('allRecordsTable').innerHTML='<p style="color:var(--red);font-size:14px;">⚠ Could not connect. Run: node server.js</p>';
  });

// load avg feedback rating
fetch(API+'/feedback')
  .then(r=>r.json())
  .then(fbs=>{
    let avg = fbs.length ? (fbs.reduce((s,f)=>s+f.rating,0)/fbs.length).toFixed(1) : '—';
    document.getElementById('avgFb').textContent = avg+(avg!=='—'?' ⭐':'');
  }).catch(()=>{});

function renderTable(data){
  if(!data.length){document.getElementById('allRecordsTable').innerHTML='<p style="color:var(--gray-400);font-size:14px;">No records.</p>';return;}
  document.getElementById('allRecordsTable').innerHTML=`
    <div class="card" style="padding:0;overflow:auto;">
    <table>
      <thead><tr><th>Patient</th><th>Age</th><th>Diagnosis</th><th>Doctor</th><th>Date</th><th>Medicine</th></tr></thead>
      <tbody>${data.map(r=>`<tr>
        <td>${r.name||'—'}</td><td>${r.age||'—'}</td><td>${r.diagnosis||'—'}</td>
        <td>${r.doctor||'—'}</td><td>${r.date||'—'}</td><td>${r.medicine||'—'}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
}

function drawCharts(){
  if(chartsDrawn) return; chartsDrawn=true;
  let diagMap={};
  records.forEach(r=>{if(r.diagnosis)diagMap[r.diagnosis]=(diagMap[r.diagnosis]||0)+1;});
  let dL=Object.keys(diagMap).slice(0,6), dV=dL.map(k=>diagMap[k]);
  new Chart(document.getElementById('diagChart'),{
    type:'doughnut',
    data:{labels:dL,datasets:[{data:dV,backgroundColor:['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4']}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:12}}}}}
  });
  let gM={Male:0,Female:0,Other:0};
  records.forEach(r=>{if(r.gender&&gM[r.gender]!==undefined)gM[r.gender]++;});
  new Chart(document.getElementById('genderChart'),{
    type:'bar',
    data:{labels:Object.keys(gM),datasets:[{label:'Patients',data:Object.values(gM),backgroundColor:['#3b82f6','#ec4899','#8b5cf6'],borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
  let mM={};
  records.forEach(r=>{if(r.date){let m=r.date.substring(0,7);mM[m]=(mM[m]||0)+1;}});
  let ms=Object.keys(mM).sort();
  new Chart(document.getElementById('timeChart'),{
    type:'line',
    data:{labels:ms,datasets:[{label:'Records',data:ms.map(m=>mM[m]),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.1)',fill:true,tension:.4,pointRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}
  });
}

function loadFeedback(){
  fetch(API+'/feedback')
    .then(r=>r.json())
    .then(fbs=>{
      document.getElementById('feedbackList').innerHTML = fbs.length===0
        ? '<div style="text-align:center;padding:40px;color:var(--gray-400);">No feedback submitted yet.</div>'
        : fbs.map(f=>`<div class="feedback-item">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
              <div class="fb-stars">${'★'.repeat(f.rating)}${'☆'.repeat(5-f.rating)}</div>
              <span class="badge badge-blue">${f.category||'General'}</span>
            </div>
            ${f.message?`<p style="font-size:14px;color:var(--gray-700);">"${f.message}"</p>`:''}
            <p style="font-size:12px;color:var(--gray-400);margin-top:4px;">${f.created_at||''}</p>
          </div>`).join('');
    })
    .catch(()=>{document.getElementById('feedbackList').innerHTML='<p style="color:var(--red);font-size:14px;">Could not load feedback.</p>';});
}

function showTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['patients','analytics','feedback'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='analytics') setTimeout(drawCharts,50);
  if(name==='feedback') loadFeedback();
}

function goAdd(){localStorage.setItem('selectedPatient',document.getElementById('patientName').value);window.location.href='add-record.html';}
function goView(){window.location.href='view-record.html';}
</script>
</body>
</html>
