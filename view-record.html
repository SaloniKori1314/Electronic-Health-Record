<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Health Records – HealthVault</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="topbar-logo-icon">💊</div>
    HealthVault
  </div>
  <div class="topbar-actions">
    <button class="btn btn-sm" onclick="window.location.href='add-record.html'">+ Add Record</button>
    <button class="btn btn-sm btn-outline" onclick="window.location.href='dashboard.html'">← Dashboard</button>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <div>
      <h2>Health Records</h2>
      <p id="recordSummary">Loading your records...</p>
    </div>
  </div>

  <div class="filter-bar fade-in">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="input" id="searchInput" placeholder="Search by diagnosis, doctor, medicine..." oninput="filterRecords()" style="margin:0;">
    </div>
    <select class="input" id="sortSelect" onchange="filterRecords()" style="width:auto;margin:0;">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
    </select>
    <select class="input" id="filterGender" onchange="filterRecords()" style="width:auto;margin:0;">
      <option value="">All genders</option>
      <option>Male</option><option>Female</option><option>Other</option>
    </select>
  </div>

  <div id="records" class="fade-in-1"></div>
</div>

<script>
let allRecords = [];
let role = localStorage.getItem('role');
let loggedPatient = localStorage.getItem('loggedPatient');

fetch('http://localhost:3000/records')
  .then(r => r.json())
  .then(data => {
    allRecords = role === 'patient' ? data.filter(r => r.name === loggedPatient) : data;
    filterRecords();
  })
  .catch(() => {
    document.getElementById('records').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <h3>Server Offline</h3>
        <p>Could not connect to server. Make sure it is running on port 3000.</p>
      </div>`;
  });

function filterRecords() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;
  const gender = document.getElementById('filterGender').value;

  let filtered = allRecords.filter(r => {
    const text = [r.diagnosis, r.doctor, r.medicine, r.symptoms, r.name].join(' ').toLowerCase();
    const matchQ = text.includes(q);
    const matchG = !gender || r.gender === gender;
    return matchQ && matchG;
  });
  if (sort === 'newest') filtered = filtered.slice().reverse();
  renderRecords(filtered);
}

function renderRecords(list) {
  document.getElementById('recordSummary').textContent = list.length + ' record' + (list.length !== 1 ? 's' : '') + ' found';

  if (list.length === 0) {
    document.getElementById('records').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📋</div>
        <h3>No records found</h3>
        <p>Try adjusting your search or <a href="add-record.html">add a new record</a>.</p>
      </div>`;
    return;
  }

  document.getElementById('records').innerHTML = list.map(r => `
    <div class="record-card">
      <div class="record-header">
        <div>
          <div class="record-diagnosis">${r.diagnosis || 'Health Record'}</div>
          <div class="record-date">📅 ${r.date || 'No date'}${r.doctor ? ' · 👨‍⚕️ Dr. ' + r.doctor : ''}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:flex-start;flex-wrap:wrap;">
          ${r.medicine ? `<span class="badge badge-green">💊 ${r.medicine}</span>` : ''}
          ${r.gender ? `<span class="badge badge-blue">${r.gender}</span>` : ''}
        </div>
      </div>
      <div class="record-meta">
        ${r.name ? `<div class="meta-item"><strong>Patient:</strong> ${r.name}</div>` : ''}
        ${r.age ? `<div class="meta-item"><strong>Age:</strong> ${r.age}</div>` : ''}
        ${r.hospital ? `<div class="meta-item"><strong>Hospital:</strong> ${r.hospital}</div>` : ''}
      </div>
      ${r.symptoms ? `<p style="font-size:13.5px;color:var(--gray-600);margin-bottom:8px;"><strong>Symptoms:</strong> ${r.symptoms}</p>` : ''}
      ${r.prescription ? `<p style="font-size:13.5px;color:var(--gray-600);margin-bottom:8px;"><strong>Prescription:</strong> ${r.prescription}</p>` : ''}
      ${(r.medicine || r.dosage || r.duration) ? `
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
        ${r.dosage ? `<span class="badge badge-amber">📏 Dosage: ${r.dosage}</span>` : ''}
        ${r.duration ? `<span class="badge badge-accent">⏱ Duration: ${r.duration}</span>` : ''}
      </div>` : ''}
      ${r.notes ? `<p style="font-size:13px;color:var(--gray-500);margin-top:10px;padding-top:10px;border-top:1px solid var(--gray-100);">📝 ${r.notes}</p>` : ''}
    </div>
  `).join('');
}
</script>
</body>
</html>
