<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HealthVault – Login</title>
<link rel="stylesheet" href="style.css">
<style>
.field { position: relative; margin: 6px 0; }
.field .input { margin: 0; }

.input.valid   { border-color: var(--green); }
.input.invalid { border-color: var(--red); }

.field-msg {
  font-size: 12px;
  margin: 3px 0 0 2px;
  min-height: 16px;
  display: block;
}
.field-msg.err { color: var(--red); }
.field-msg.ok  { color: var(--green); }

/* alert banners */
.alert {
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 14px;
  margin-bottom: 14px;
  display: none;
  line-height: 1.5;
}
.alert-error {
  background: var(--red-light);
  border: 1px solid #fca5a5;
  color: #b91c1c;
}
.alert-info {
  background: var(--blue-light);
  border: 1px solid var(--blue-mid);
  color: #1e40af;
}

.role-group { display:flex;gap:10px;margin:12px 0; }
.role-btn {
  flex:1;padding:10px;border:1.5px solid var(--gray-200);
  border-radius:var(--radius-sm);cursor:pointer;
  background:#fff;font-size:14px;font-family:inherit;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;
}
.role-btn.selected { border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:500; }

.row-flex { display:flex;justify-content:space-between;align-items:center;font-size:13px;margin:4px 0 8px; }

.show-pass {
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:13px;
}

.btn:disabled { opacity:.5;cursor:not-allowed; }
</style>
</head>
<body>
<div class="container">

  <!-- LEFT -->
  <div class="left">
    <h1>HealthVault</h1>
    <p>Your Health Records, Securely Managed</p>
    <div class="features">
      <div><span class="feat-icon">🔒</span> Bank-level security</div>
      <div><span class="feat-icon">📱</span> Access anywhere, anytime</div>
      <div><span class="feat-icon">📋</span> Complete medical history</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="form-box">
      <div class="form-title">Welcome Back</div>
      <div class="form-sub">Sign in to access your health records</div>

      <!-- error / info banners -->
      <div class="alert alert-error" id="errorBox"></div>
      <div class="alert alert-info"  id="infoBox"></div>

      <!-- Email -->
      <div class="field">
        <input class="input" id="email" type="email" placeholder="Email Address"
               oninput="validateEmail()" onblur="validateEmail(true)">
        <span class="field-msg" id="emailMsg"></span>
      </div>

      <!-- Password -->
      <div class="field" style="position:relative;">
        <input class="input" id="password" type="password" placeholder="Password"
               oninput="validatePassword()" onblur="validatePassword(true)"
               style="padding-right:60px;">
        <button class="show-pass" type="button" onclick="togglePass(this)" tabindex="-1">Show</button>
        <span class="field-msg" id="passMsg"></span>
      </div>

      <div class="row-flex">
        <label style="display:flex;gap:6px;align-items:center;cursor:pointer;">
          <input type="checkbox" id="remember" style="width:auto;"> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <!-- Role -->
      <p style="font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:4px;">Sign in as</p>
      <div class="role-group">
        <button class="role-btn selected" onclick="selectRole(this,'patient')">🧑 Patient</button>
        <button class="role-btn" onclick="selectRole(this,'doctor')">👨‍⚕️ Doctor</button>
      </div>

      <button class="btn" id="loginBtn" onclick="login()">Sign In</button>

      <div class="link">
        Don't have an account? <a href="register.html">Create Account</a>
      </div>
    </div>
  </div>

</div>
<script>
const API = 'http://localhost:3000';
let selectedRole = 'patient';

// ── ROLE ──
function selectRole(el, role) {
  selectedRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function togglePass(btn) {
  const inp = document.getElementById('password');
  const hidden = inp.type === 'password';
  inp.type = hidden ? 'text' : 'password';
  btn.textContent = hidden ? 'Hide' : 'Show';
}

// ── VALIDATION ──
function setField(inputId, msgId, isValid, message) {
  const inp = document.getElementById(inputId);
  const msg = document.getElementById(msgId);
  inp.classList.toggle('valid',   isValid === true);
  inp.classList.toggle('invalid', isValid === false);
  msg.textContent = message;
  msg.className = 'field-msg ' + (isValid === true ? 'ok' : isValid === false ? 'err' : '');
}

function validateEmail(blur) {
  const v = document.getElementById('email').value.trim();
  if (!v && !blur) return false;
  if (!v) { setField('email','emailMsg', false, 'Email is required.'); return false; }
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  if (!ok) { setField('email','emailMsg', false, 'Enter a valid email address.'); return false; }
  setField('email','emailMsg', true, '✓ Valid email');
  return true;
}

function validatePassword(blur) {
  const v = document.getElementById('password').value;
  if (!v && !blur) return false;
  if (!v) { setField('password','passMsg', false, 'Password is required.'); return false; }
  if (v.length < 6) { setField('password','passMsg', false, 'Password must be at least 6 characters.'); return false; }
  setField('password','passMsg', true, '✓ OK');
  return true;
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.style.display = 'block';
  document.getElementById('infoBox').style.display = 'none';
}
function showInfo(msg) {
  const box = document.getElementById('infoBox');
  box.innerHTML = msg;
  box.style.display = 'block';
  document.getElementById('errorBox').style.display = 'none';
}
function clearAlerts() {
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('infoBox').style.display  = 'none';
}

// ── LOGIN ──
async function login() {
  clearAlerts();

  const emailOk = validateEmail(true);
  const passOk  = validatePassword(true);
  if (!emailOk || !passOk) return;

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const body = {
    email:    document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    role:     selectedRole
  };

  try {
    const res  = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();

    if (!res.ok) {
      // Show specific errors with helpful hints
      if (res.status === 404) {
        showInfo('⚠ No account found with this email.<br><a href="register.html" style="font-weight:600;">Create an account →</a>');
        setField('email','emailMsg', false, 'Email not registered.');
      } else if (res.status === 401) {
        showError('❌ Incorrect password. Please try again.');
        setField('password','passMsg', false, 'Wrong password.');
        document.getElementById('password').value = '';
      } else if (res.status === 403) {
        showError('⚠ ' + data.error);
      } else {
        showError(data.error || 'Login failed. Please try again.');
      }
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }

    // Success — save session
    const user = data.user;
    localStorage.setItem('role',          user.role);
    localStorage.setItem('loggedPatient', user.fullname);
    localStorage.setItem('userEmail',     user.email);
    localStorage.setItem('userId',        user.id);

    if (document.getElementById('remember').checked) {
      localStorage.setItem('savedEmail', user.email);
      localStorage.setItem('savedRole',  user.role);
    }

    window.location.href = user.role === 'doctor' ? 'doctor-dashboard.html' : 'dashboard.html';

  } catch {
    showError('⚠ Cannot connect to server. Make sure it is running (node server.js).');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

// ── AUTO-FILL remembered email ──
window.addEventListener('load', () => {
  const saved = localStorage.getItem('savedEmail');
  if (saved) {
    document.getElementById('email').value = saved;
    validateEmail(true);
    const role = localStorage.getItem('savedRole');
    if (role) {
      selectedRole = role;
      document.querySelectorAll('.role-btn').forEach(b => {
        b.classList.toggle('selected', b.textContent.toLowerCase().includes(role));
      });
    }
  }
});

// Allow Enter key to submit
document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
